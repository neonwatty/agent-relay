name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag to publish
        required: true
        default: latest
      dry_run:
        description: Run npm publish in dry-run mode
        required: true
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Use current npm
        run: |
          npm install -g npm@latest
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Run quality gates
        run: npm run check

      - name: Ensure version is unpublished
        run: |
          set +e
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          output="$(npm view "${package_name}@${package_version}" version 2>&1)"
          view_status=$?
          set -e

          if [ "$view_status" -eq 0 ]; then
            echo "::error title=Version already published::${package_name}@${package_version} already exists on npm."
            exit 1
          fi

          if echo "$output" | grep -Eq 'E404|404 Not Found'; then
            echo "${package_name}@${package_version} is not published yet."
            exit 0
          fi

          echo "$output"
          echo "::error title=Unable to verify npm version::npm view failed for ${package_name}@${package_version}."
          exit "$view_status"

      - name: Publish dry run
        if: ${{ inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --dry-run --tag "${{ inputs.tag }}" --access public

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --tag "${{ inputs.tag }}" --access public

      - name: Tag published source
        if: ${{ !inputs.dry_run }}
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tag="v${package_version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "${tag} already exists."
            exit 0
          fi
          git tag "${tag}"
          git push origin "${tag}"
